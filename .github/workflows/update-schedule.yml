name: Apply Sunday Aloha schedule

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-schedule.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update itinerary and restore complete app logic
        shell: bash
        run: |
          git show 6a0cd658853053d209004be3d09c0fbe903789f4:app.js > app.js
          python3 - <<'PY'
          from pathlib import Path
          import re

          index = Path("index.html")
          html = index.read_text()

          # Remove the old Saturday Aloha breakfast card.
          html, removed = re.subn(
              r'<article class="stop-card glass" data-datetime="2026-07-11T07:45:00-07:00">.*?<h3>Aloha Stacks breakfast</h3>.*?</article>',
              '',
              html,
              count=1,
              flags=re.S,
          )
          if removed != 1:
              raise SystemExit("Could not find the old Saturday Aloha card")

          saturday_departure = '''<article class="stop-card glass" data-datetime="2026-07-11T08:15:00-07:00"><div class="time-pill">8:15 AM</div><div class="stop-icon">🚗</div><div class="stop-content"><h3>Leave RSM for Downtown LA</h3><p>Skip a full breakfast stop today and head straight toward the Jewelry District. This leaves a comfortable traffic and parking buffer before the gold shops open.</p><div class="stop-meta"><span>RSM → DTLA Jewelry District</span><span>Allow about 1 hr 30 min</span></div><div class="stop-actions"><a class="mini-button" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&amp;origin=Rancho+Santa+Margarita+CA&amp;destination=St.+Vincent+Jewelry+Center+650+S+Hill+St+Los+Angeles">Route</a><label class="check-control"><input type="checkbox" data-check="sat-drive" /> Done</label></div></div></article>'''
          gold_marker = '<article class="stop-card glass" data-datetime="2026-07-11T10:00:00-07:00">'
          if gold_marker not in html:
              raise SystemExit("Could not find the Saturday gold stop")
          html = html.replace(gold_marker, saturday_departure + gold_marker, 1)

          sunday_breakfast = '''<article class="stop-card glass featured" data-datetime="2026-07-12T09:30:00-07:00"><div class="time-pill">9:30 AM</div><div class="stop-icon">🥞</div><div class="stop-content"><h3>Aloha Stacks birthday breakfast</h3><p>Start her birthday with the bigger breakfast here. Take your time—there is still a long break before leaving for Laguna.</p><div class="stop-meta"><span>Rancho Santa Margarita</span><span>About 60 min</span></div><div class="stop-actions"><a class="mini-button" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&amp;query=Aloha+Stacks+Rancho+Santa+Margarita">Directions</a><label class="check-control"><input type="checkbox" data-check="sun-breakfast" /> Done</label></div></div></article><article class="stop-card glass" data-datetime="2026-07-12T10:45:00-07:00"><div class="time-pill">Late morning</div><div class="stop-icon">🎁</div><div class="stop-content"><h3>Relax at home and get ready</h3><p>Card, flowers or gift, then plenty of downtime to relax and get ready without rushing before Laguna.</p><div class="stop-meta"><span>Home</span><span>Unstructured</span></div><div class="stop-actions"><label class="check-control"><input type="checkbox" data-check="sun-morning" /> Done</label></div></div></article>'''
          html, replaced = re.subn(
              r'<article class="stop-card glass" data-datetime="2026-07-12T09:30:00-07:00">.*?<h3>Slow birthday morning</h3>.*?</article>',
              sunday_breakfast,
              html,
              count=1,
              flags=re.S,
          )
          if replaced != 1:
              raise SystemExit("Could not find the old Sunday morning card")

          html = html.replace('Laguna birthday day</small>', 'Breakfast + Laguna birthday</small>', 1)
          index.write_text(html)

          app = Path("app.js")
          js = app.read_text()
          js = js.replace(
              '{ name: "Aloha Stacks breakfast", date: "2026-07-11T07:45:00-07:00" },',
              '{ name: "Leave RSM for Downtown LA", date: "2026-07-11T08:15:00-07:00" },',
              1,
          )
          js = js.replace(
              '{ name: "Leave for Laguna", date: "2026-07-12T14:15:00-07:00" },',
              '{ name: "Aloha Stacks birthday breakfast", date: "2026-07-12T09:30:00-07:00" },\n  { name: "Relax at home and get ready", date: "2026-07-12T10:45:00-07:00" },\n  { name: "Leave for Laguna", date: "2026-07-12T14:15:00-07:00" },',
              1,
          )
          js = js.replace(
              'Saturday: DTLA gold + Beverly Hills. Sunday: Sawdust + Splashes in Laguna Beach.',
              'Saturday: DTLA gold + Beverly Hills. Sunday: Aloha Stacks + Sawdust + Splashes in Laguna Beach.',
              1,
          )

          enhancement = r'''

          // Live gold pricing and Apple Maps enhancements.
          (() => {
            const GOLD_API_URL = "https://api.gold-api.com/price/XAU/USD";
            const GOLD_CACHE_KEY = "weekend-luxe-live-gold";
            const all = selector => [...document.querySelectorAll(selector)];

            all("a[href*='google.com/maps']").forEach(link => {
              try {
                const source = new URL(link.href);
                const destination = source.searchParams.get("destination") || source.searchParams.get("query");
                const origin = source.searchParams.get("origin");
                if (!destination) return;
                const apple = new URL("https://maps.apple.com/");
                if (origin) apple.searchParams.set("saddr", origin);
                apple.searchParams.set("daddr", destination);
                apple.searchParams.set("dirflg", "d");
                link.href = apple.toString();
                if (link.textContent.trim() === "Directions") link.textContent = "Apple Maps";
                if (link.textContent.trim() === "Route") link.textContent = "Open in Maps";
              } catch (error) {
                console.error("Could not convert map link", error);
              }
            });

            const footerNotes = all("footer p");
            if (footerNotes[1]) footerNotes[1].textContent = "Weather: Open-Meteo · Gold: Gold API · Directions: Apple Maps";

            const spotInput = document.querySelector("#spotPrice");
            const calculator = spotInput?.closest(".calculator-grid");
            if (!calculator) return;

            const panel = document.createElement("div");
            panel.className = "gold-live-panel";
            panel.setAttribute("aria-live", "polite");
            panel.innerHTML = `<div class="gold-live-copy"><span class="gold-live-label">Live XAU/USD spot · 1 troy oz</span><strong id="liveGoldPrice">Loading current gold price…</strong><small id="goldUpdatedAt">Connecting to Gold API</small></div><button id="refreshGold" class="button button-secondary" type="button">Refresh gold</button>`;
            const note = document.createElement("p");
            note.className = "gold-api-note";
            note.textContent = "Live market spot automatically fills the calculator. A dealer’s retail price will normally be higher.";
            calculator.before(panel, note);

            const style = document.createElement("style");
            style.textContent = `.gold-live-panel{display:flex;align-items:center;justify-content:space-between;gap:18px;margin:4px 0 10px;padding:18px;border-radius:18px;background:linear-gradient(125deg,rgba(12,23,32,.97),rgba(13,91,119,.92));color:#fff;box-shadow:0 16px 35px rgba(12,23,32,.18)}.gold-live-copy{display:grid;gap:4px}.gold-live-label{color:var(--gold-light);font-size:.73rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}#liveGoldPrice{font-size:clamp(1.55rem,4vw,2.2rem);line-height:1.1}#goldUpdatedAt{color:rgba(255,255,255,.72);font-size:.76rem}.gold-live-panel .button-secondary{background:#fff;color:var(--ink);white-space:nowrap}.gold-api-note{margin:0 0 16px;color:#67767d;font-size:.78rem}@media(max-width:620px){.gold-live-panel{align-items:stretch;flex-direction:column}.gold-live-panel .button{width:100%}}`;
            document.head.appendChild(style);

            const formatTime = value => {
              const date = new Date(value);
              if (Number.isNaN(date.getTime())) return "Updated recently";
              return `Updated ${new Intl.DateTimeFormat("en-US", { weekday: "short", hour: "numeric", minute: "2-digit", timeZone: "America/Los_Angeles", timeZoneName: "short" }).format(date)}`;
            };

            const display = (payload, stale = false) => {
              const price = Number(payload?.price);
              if (!(price > 0)) throw new Error("Gold API returned an invalid price");
              document.querySelector("#liveGoldPrice").textContent = `${new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(price)} / oz`;
              document.querySelector("#goldUpdatedAt").textContent = `${formatTime(payload.updatedAt || payload.savedAt || new Date().toISOString())}${stale ? " · saved value" : " · live market spot"}`;
              spotInput.value = price.toFixed(2);
              updateQuote();
            };

            const load = async announce => {
              const priceElement = document.querySelector("#liveGoldPrice");
              const updatedElement = document.querySelector("#goldUpdatedAt");
              priceElement.textContent = "Loading current gold price…";
              updatedElement.textContent = "Connecting to Gold API";
              try {
                const response = await fetch(GOLD_API_URL, { cache: "no-store" });
                if (!response.ok) throw new Error(`Gold API returned ${response.status}`);
                const saved = { ...(await response.json()), savedAt: new Date().toISOString() };
                localStorage.setItem(GOLD_CACHE_KEY, JSON.stringify(saved));
                display(saved);
                if (announce) showToast("Gold spot price refreshed");
              } catch (error) {
                console.error(error);
                try {
                  const cached = JSON.parse(localStorage.getItem(GOLD_CACHE_KEY));
                  if (cached) {
                    display(cached, true);
                    if (announce) showToast("Using the last saved gold price");
                    return;
                  }
                } catch (cacheError) {
                  console.error(cacheError);
                }
                priceElement.textContent = "Gold price unavailable";
                updatedElement.textContent = "Enter spot price manually below";
                if (announce) showToast("Could not refresh gold price");
              }
            };

            document.querySelector("#refreshGold").addEventListener("click", () => load(true));
            load(false);
            setInterval(() => load(false), 60_000);
          })();
          '''
          app.write_text(js + enhancement)

          Path("sw.js").write_text('''const CACHE = "weekend-luxe-v6";
          const APP_SHELL = ["./", "./index.html", "./styles.css", "./app.js", "./manifest.webmanifest", "./assets/weekend-luxe-logo.svg"];
          self.addEventListener("install", event => { event.waitUntil(caches.open(CACHE).then(cache => cache.addAll(APP_SHELL))); self.skipWaiting(); });
          self.addEventListener("activate", event => { event.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(key => key !== CACHE).map(key => caches.delete(key))))); self.clients.claim(); });
          self.addEventListener("fetch", event => {
            const request = event.request;
            if (request.url.includes("api.open-meteo.com") || request.url.includes("api.gold-api.com")) { event.respondWith(fetch(request).catch(() => caches.match(request))); return; }
            if (request.mode === "navigate") { event.respondWith(fetch(request).then(response => { const copy = response.clone(); caches.open(CACHE).then(cache => cache.put("./index.html", copy)); return response; }).catch(() => caches.match("./index.html"))); return; }
            event.respondWith(caches.match(request).then(cached => cached || fetch(request).then(response => { const copy = response.clone(); caches.open(CACHE).then(cache => cache.put(request, copy)); return response; })));
          });
          ''')
          PY
          node --check app.js

      - name: Commit schedule update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/update-schedule.yml
          git add index.html app.js sw.js
          git commit -m "Move Aloha Stacks to Sunday"
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload updated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy updated site
        id: deployment
        uses: actions/deploy-pages@v4
