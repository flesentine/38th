name: Fix Weekend Luxe console errors

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fix-console-errors.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch gold endpoint and install handling
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app = Path("app.js")
          text = app.read_text()

          text = text.replace(
              'const GOLD_API_URL = "https://api.gold-api.com/price/XAU/USD";',
              'const GOLD_API_URL = "https://api.gold-api.com/price/XAU";'
          )

          text = text.replace(
              '      const freshUrl = `${GOLD_API_URL}?_fresh=${Date.now()}`;\n      const response = await fetch(freshUrl, {',
              '      const response = await fetch(GOLD_API_URL, {'
          )

          old_install = '''function setupInstallPrompt() {
            window.addEventListener("beforeinstallprompt", event => {
              event.preventDefault();
              deferredInstallPrompt = event;
              $("#installButton").hidden = false;
            });

            $("#installButton")?.addEventListener("click", async () => {
              if (!deferredInstallPrompt) return;
              deferredInstallPrompt.prompt();
              await deferredInstallPrompt.userChoice;
              deferredInstallPrompt = null;
              $("#installButton").hidden = true;
            });
          }'''

          new_install = '''function setupInstallPrompt() {
            // Let Chrome expose its native install UI. Intercepting the event without
            // immediately prompting creates a noisy console warning.
            $("#installButton")?.remove();
          }'''

          if old_install not in text:
              raise SystemExit("Install prompt block did not match")

          text = text.replace(old_install, new_install)
          app.write_text(text)

          sw = Path("sw.js")
          sw_text = sw.read_text().replace(
              'const CACHE = "weekend-luxe-v10";',
              'const CACHE = "weekend-luxe-v11";'
          )
          sw.write_text(sw_text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js sw.js
          git commit -m "Fix gold endpoint and install prompt warning"
          git push
