name: Compact mobile weather

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/compact-mobile-weather.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compact weather on phones
        run: |
          python3 - <<'PY'
          from pathlib import Path

          css = Path("styles.css")
          text = css.read_text()
          marker = "/* Compact mobile weather */"
          patch = r'''

/* Compact mobile weather */
@media (max-width: 650px) {
  html[data-active-day="saturday"] .weather-card[data-weather-day="sunday"],
  html[data-active-day="sunday"] .weather-card[data-weather-day="saturday"] {
    display: none;
  }

  .weather-section.section-block {
    margin: 22px 0 30px;
  }

  .weather-section .section-heading {
    align-items: center;
    margin-bottom: 8px;
  }

  .weather-section .section-heading h2 {
    font-size: 1.45rem;
  }

  .weather-section .eyebrow {
    margin-bottom: 4px;
    font-size: .65rem;
  }

  .weather-section .section-note {
    display: none;
  }

  .weather-section .text-button {
    padding: 7px 4px;
    font-size: .76rem;
  }

  .weather-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .weather-card {
    min-height: 0;
    padding: 12px;
    border-radius: 16px;
  }

  .weather-card::after {
    width: 72px;
    height: 72px;
    right: -24px;
    top: -26px;
  }

  .weather-day {
    display: none;
  }

  .weather-icon {
    font-size: 1.45rem;
  }

  .weather-condition {
    margin: 8px 0 4px;
    font-size: .74rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .weather-temps {
    gap: 4px;
    flex-wrap: wrap;
  }

  .weather-high {
    font-size: 1.48rem;
  }

  .weather-low {
    font-size: .68rem;
  }

  .weather-stats {
    display: grid;
    justify-content: start;
    gap: 2px;
    margin-top: 6px;
    font-size: .66rem;
  }
}
'''
          if marker not in text:
              css.write_text(text + patch)

          sw = Path("sw.js")
          sw_text = sw.read_text()
          sw_text = sw_text.replace('const CACHE = "weekend-luxe-v8";', 'const CACHE = "weekend-luxe-v9";')
          sw.write_text(sw_text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add styles.css sw.js
          git commit -m "Compact mobile weather cards" || exit 0
          git push
